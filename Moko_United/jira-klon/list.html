<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liste | Moka Akış</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%231868DB'/%3E%3Ctext x='12' y='17' font-family='Arial' font-size='14' font-weight='700' fill='white' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="assets/css/fonts.css?v=1">
<link rel="stylesheet" href="assets/css/tokens.css?v=1">
<link rel="stylesheet" href="assets/css/jira.css?v=1">
</head>
<body>

<div id="jTopbar"></div>
<div id="jSidebar"></div>

<main class="j-shell-main" id="jMain">
  <div class="j-page-head">
    <div class="j-breadcrumb"><span>MOKA</span><span class="j-crumb-sep">/</span><span class="j-crumb-current">Liste</span></div>
    <h1 class="j-heading-l">Liste</h1>
  </div>

  <div class="j-panel" style="margin-bottom:16px;padding:12px 16px;">
    <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
      <input type="text" id="fSearch" class="j-input" style="max-width:240px;" placeholder="Ara: özet, açıklama, MOKA-1...">
      <select id="fStatus" class="j-select" style="max-width:170px;"><option value="">Tüm Durumlar</option></select>
      <select id="fIssuetype" class="j-select" style="max-width:160px;"><option value="">Tüm Türler</option></select>
      <select id="fPriority" class="j-select" style="max-width:150px;"><option value="">Tüm Öncelikler</option></select>
      <select id="fCategory" class="j-select" style="max-width:190px;"><option value="">Tüm Kategoriler</option></select>
      <select id="fTeam" class="j-select" style="max-width:200px;"><option value="">Tüm Ekipler</option></select>
      <select id="fSla" class="j-select" style="max-width:160px;">
        <option value="">Tüm SLA Durumları</option>
        <option value="ok">SLA: Normal</option>
        <option value="risk">SLA: Risk</option>
        <option value="breach">SLA: Aşıldı</option>
      </select>
      <button class="j-btn j-btn-subtle j-btn-sm" id="fClear">Filtreleri Temizle</button>
    </div>
  </div>

  <div class="j-panel" style="padding:0;overflow-x:auto;">
    <table style="width:100%;border-collapse:collapse;font-size:14px;">
      <thead>
        <tr style="border-bottom:1px solid var(--j-border);">
          <th style="text-align:left;padding:10px 12px;color:var(--j-text-subtlest);font-weight:600;font-size:12px;text-transform:uppercase;width:36px;"></th>
          <th style="text-align:left;padding:10px 12px;color:var(--j-text-subtlest);font-weight:600;font-size:12px;text-transform:uppercase;">Talep</th>
          <th style="text-align:left;padding:10px 12px;color:var(--j-text-subtlest);font-weight:600;font-size:12px;text-transform:uppercase;width:60px;">Öncelik</th>
          <th style="text-align:left;padding:10px 12px;color:var(--j-text-subtlest);font-weight:600;font-size:12px;text-transform:uppercase;width:130px;">Durum</th>
          <th style="text-align:left;padding:10px 12px;color:var(--j-text-subtlest);font-weight:600;font-size:12px;text-transform:uppercase;width:60px;">Atanan</th>
          <th style="text-align:left;padding:10px 12px;color:var(--j-text-subtlest);font-weight:600;font-size:12px;text-transform:uppercase;width:120px;">SLA</th>
          <th style="text-align:left;padding:10px 12px;color:var(--j-text-subtlest);font-weight:600;font-size:12px;text-transform:uppercase;width:130px;">Oluşturma</th>
        </tr>
      </thead>
      <tbody id="issueRows">
        <tr><td colspan="7" class="j-empty">Yükleniyor...</td></tr>
      </tbody>
    </table>
  </div>

  <div id="pagination" style="display:flex;gap:6px;justify-content:center;margin-top:16px;"></div>
</main>

<script src="assets/js/shell.js?v=1"></script>
<script src="assets/js/components.js?v=1"></script>
<script src="assets/js/create-modal.js?v=1"></script>
<script src="assets/js/list.js?v=1"></script>
</body>
</html>
