<style>
  .j-kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .j-kpi-card { background: var(--j-surface); border-radius: var(--j-radius-md); box-shadow: var(--j-shadow-raised); padding: 16px; }
  .j-kpi-value { font-size: 28px; font-weight: 700; line-height: 32px; }
  .j-kpi-label { font-size: 12px; color: var(--j-text-subtlest); margin-top: 4px; }
  .j-dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) { .j-kpi-grid { grid-template-columns: repeat(2, 1fr); } .j-dash-grid { grid-template-columns: 1fr; } }
  .j-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
  .j-bar-label { flex: 0 0 140px; }
  .j-bar-track { flex: 1; height: 8px; background: var(--j-neutral-subtle); border-radius: 4px; overflow: hidden; }
  .j-bar-fill { display: block; height: 100%; border-radius: 4px; }
  .j-bar-count { flex: 0 0 28px; text-align: right; color: var(--j-text-subtlest); }
</style>
